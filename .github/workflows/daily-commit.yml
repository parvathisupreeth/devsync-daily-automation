name: Daily Auto Commit

on:
  schedule:
    - cron: '0 9 * * *'   # Runs every day at 9:00 AM UTC
  workflow_dispatch:      # Allows manual trigger for testing

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update file - 22f3001903@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "22f3001903@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
